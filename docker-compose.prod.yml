services:
  database:
    image: postgres:18
    container_name: postgres_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Mở port cho localhost (127.0.0.1) trên VPS để có thể kết nối pgAdmin qua SSH Tunnel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nest_backend_prod
    restart: always
    depends_on:
      - database
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    # Trên Coolify (sử dụng Traefik), bạn không cần expose port ra ngoài.
    # Traefik sẽ tự động định tuyến từ tên miền (VD: api.domain.com) vào port 3000 bên trong container.
    ports:
      - "3000:3000"

  frontend_admin:
    build:
      context: .
      dockerfile: frontend_admin/Dockerfile
    container_name: next_frontend_admin_prod
    restart: always
    depends_on:
      - backend
    environment:
      # Biến này rất quan trọng. Trên Coolify, bạn phải truyền tên miền thực tế của backend vào đây
      # Ví dụ: NEXT_PUBLIC_API_URL=https://api.yourdomain.com
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3001"

  frontend_client:
    build:
      context: .
      dockerfile: frontend_client/Dockerfile
    container_name: next_frontend_client_prod
    restart: always
    depends_on:
      - backend
    environment:
      # Truyền tên miền thực tế của backend vào đây
      # Ví dụ: NEXT_PUBLIC_API_URL=https://api.yourdomain.com
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3002:3002"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend_client
      - frontend_admin
      - backend

volumes:
  postgres_data_prod:
