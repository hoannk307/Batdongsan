services:
  database:
    image: postgres:18
    container_name: postgres_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_prod:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_network

  backend:
    image: ghcr.io/${GITHUB_REPO_OWNER}/batdongsan-backend:latest
    container_name: nest_backend_prod
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "3000:3000"
    networks:
      - app_network

  frontend_admin:
    image: ghcr.io/${GITHUB_REPO_OWNER}/batdongsan-frontend_admin:latest
    container_name: next_frontend_admin_prod
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # URL nội bộ Docker để server-side API routes gọi backend trực tiếp
      INTERNAL_API_URL: http://backend:3000/api
    ports:
      - "3001:3001"
    networks:
      - app_network

  frontend_client:
    image: ghcr.io/${GITHUB_REPO_OWNER}/batdongsan-frontend_client:latest
    container_name: next_frontend_client_prod
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # URL nội bộ Docker để server-side API routes gọi backend trực tiếp
      INTERNAL_API_URL: http://backend:3000/api
    ports:
      - "3002:3002"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - frontend_client
      - frontend_admin
      - backend
    # Tạo self-signed cert nếu chưa có, rồi khởi động nginx
    entrypoint: /bin/sh -c "if [ ! -f /etc/nginx/ssl/selfsigned.crt ]; then mkdir -p /etc/nginx/ssl && apk add --no-cache openssl && openssl req -x509 -nodes -newkey rsa:2048 -days 3650 -keyout /etc/nginx/ssl/selfsigned.key -out /etc/nginx/ssl/selfsigned.crt -subj '/CN=nhatranglands.vn'; fi && nginx -g 'daemon off;'"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data_prod:
  nginx_ssl:
