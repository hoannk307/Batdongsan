# ============================================
# CI/CD Pipeline: Build, Push to GHCR, Deploy to VPS
# Triggers on push to main branch
# ============================================

name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Lowercase repo name (GHCR requires lowercase)
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ============================================
  # Job 1: Build Docker images and push to GHCR
  # ============================================
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, frontend_admin, frontend_client]
        include:
          - service: backend
            dockerfile: backend/Dockerfile
          - service: frontend_admin
            dockerfile: frontend_admin/Dockerfile
          - service: frontend_client
            dockerfile: frontend_client/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/batdongsan-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/batdongsan-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # ============================================
  # Job 2: Deploy to VPS via SSH
  # ============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for deployment
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          # Use printenv + grep to safely write values (handles all special chars)
          {
            echo "GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER}"
            echo "POSTGRES_USER=${POSTGRES_USER}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_DB=${POSTGRES_DB}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "JWT_EXPIRES_IN=${JWT_EXPIRES_IN}"
            echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}"
            echo "R2_ENDPOINT=${R2_ENDPOINT}"
            echo "R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}"
            echo "R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}"
            echo "R2_BUCKET=${R2_BUCKET}"
            echo "R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}"
          } > deploy.env
          echo "=== .env file created ($(wc -l < deploy.env) lines) ==="

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.deploy.yml,nginx/,scripts/,deploy.env"
          target: /opt/batdongsan
          overwrite: true
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # Login to GHCR on VPS using PAT
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Navigate to deploy directory
            cd /opt/batdongsan

            # Move the env file into place
            mv deploy.env .env

            # Debug: verify .env
            echo "=== .env has $(wc -l < .env) lines ==="

            # Make deploy script executable and run
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh
