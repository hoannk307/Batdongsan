worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Cấu hình cho Frontend Client
    server {
        listen 80;
        server_name nhatranglands.com www.nhatranglands.com client.localhost;

        location / {
            proxy_pass http://frontend_client:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Cấu hình cho Frontend Admin
    server {
        listen 80;
        server_name admin.nhatranglands.com admin.localhost;

        location / {
            proxy_pass http://frontend_admin:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Cấu hình cho Backend API
    server {
        listen 80;
        server_name api.nhatranglands.com api.localhost;

        location / {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
