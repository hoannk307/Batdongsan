worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Giới hạn kích thước upload
    client_max_body_size 20M;

    # Docker DNS resolver - cho phép resolve tên service động
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Chỉ set Connection: upgrade khi thực sự là WebSocket request
    # Request HTTP thông thường sẽ giữ Connection header mặc định (rỗng)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # ============================================
    # SSL Settings (self-signed cert cho Cloudflare Full mode)
    # ============================================
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ============================================
    # HTTP -> HTTPS Redirect
    # ============================================
    server {
        listen 80;
        server_name nhatranglands.vn www.nhatranglands.vn admin.nhatranglands.vn api.nhatranglands.vn image.nhatranglands.vn;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS - Frontend Client
    # ============================================
    server {
        listen 443 ssl;
        server_name nhatranglands.vn www.nhatranglands.vn image.nhatranglands.vn;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            set $upstream_client http://frontend_client:3002;
            proxy_pass $upstream_client;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept $http_accept;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
        }
    }

    # ============================================
    # HTTPS - Frontend Admin
    # ============================================
    server {
        listen 443 ssl;
        server_name admin.nhatranglands.vn image.nhatranglands.vn;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            set $upstream_admin http://frontend_admin:3001;
            proxy_pass $upstream_admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept $http_accept;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
        }
    }

    # ============================================
    # HTTPS - Backend API
    # ============================================
    server {
        listen 443 ssl;
        server_name api.nhatranglands.vn;

        add_header X-Content-Type-Options "nosniff" always;

        location / {
            set $upstream_backend http://backend:3000;
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
